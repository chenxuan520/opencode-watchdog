name: Publish npm package

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check published version
        id: package
        shell: bash
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version $NAME@$VERSION already exists on npm. Skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version $NAME@$VERSION is new. Publishing."
          fi

      - name: Publish to npm
        if: steps.package.outputs.published == 'false'
        run: npm publish

      - name: Publish summary
        run: |
          if [ "${{ steps.package.outputs.published }}" = "true" ]; then
            echo "Skipped npm publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists."
          else
            echo "Published ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} to npm."
          fi
